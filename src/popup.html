<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ThreadAtlas</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body class="popup-page">
    <main class="mini-popup">
      <header class="mini-hero">
        <div class="mini-hero__top">
          <div>
            <p class="mini-hero__eyebrow">Thread Workspace</p>
            <h1 class="mini-hero__title">ThreadAtlas</h1>
          </div>
          <button id="open-settings" class="mini-button mini-button--ghost" type="button">完整设置</button>
        </div>
        <div class="mini-hero__badges">
          <span class="popup-badge popup-badge--soft" id="popup-site-badge">检测中</span>
          <span class="popup-badge popup-badge--soft" id="popup-live-badge">等待连接</span>
        </div>
        <p class="mini-hero__hint" id="popup-tab-hint">当前页：检测中...</p>
        <p class="mini-hero__summary" id="popup-summary">正在分析当前页面状态与可用能力。</p>
        <div class="mini-stats">
          <div class="mini-stat">
            <span class="mini-stat__label">时间轴</span>
            <strong class="mini-stat__value" id="popup-stat-timeline">-</strong>
          </div>
          <div class="mini-stat">
            <span class="mini-stat__label">滚动模式</span>
            <strong class="mini-stat__value" id="popup-stat-scroll-mode">-</strong>
          </div>
          <div class="mini-stat">
            <span class="mini-stat__label">本地同步</span>
            <strong class="mini-stat__value" id="popup-stat-sync">-</strong>
          </div>
        </div>
      </header>

      <section class="mini-card">
        <div class="mini-section-head">
          <h2>快速控制</h2>
          <p>浏览器 popup 只放高频项，避免被尺寸限制挤坏。</p>
        </div>
        <div class="mini-grid">
          <label class="mini-toggle">
            <input id="setting-timeline-enabled" type="checkbox">
            <span class="mini-toggle__meta">
              <span class="mini-toggle__title">启用时间轴</span>
              <span class="mini-toggle__hint">当前页即时生效</span>
            </span>
          </label>
          <label class="mini-toggle">
            <input id="setting-history-cleaner-auto-maintain" type="checkbox">
            <span class="mini-toggle__meta">
              <span class="mini-toggle__title">自动无感归档</span>
              <span class="mini-toggle__hint">默认保留最近 10 轮</span>
            </span>
          </label>
          <label class="mini-field">
            <span class="mini-field__label">公式复制格式</span>
            <select id="setting-formula-format"></select>
          </label>
          <label class="mini-field">
            <span class="mini-field__label">时间线滚动模式</span>
            <select id="setting-timeline-scroll-mode"></select>
          </label>
        </div>
      </section>

      <section class="mini-card">
        <div class="mini-section-head">
          <h2>历史裁剪</h2>
          <p>手动检查和立即裁剪，适合长会话临时整理。</p>
        </div>
        <div class="mini-grid mini-grid--single">
          <label class="mini-field">
            <span class="mini-field__label">保留最近轮数</span>
            <input id="setting-history-cleaner-keep-rounds" type="number" min="1" max="100" step="1">
          </label>
          <div class="mini-actions">
            <button id="history-cleaner-check" class="mini-button mini-button--ghost" type="button">查看轮数</button>
            <button id="history-cleaner-trim" class="mini-button mini-button--primary" type="button">立即裁剪</button>
          </div>
        </div>
      </section>

      <section class="mini-card">
        <div class="mini-section-head">
          <h2>本地同步</h2>
          <p>需要本地服务时再启用。</p>
        </div>
        <div class="mini-grid">
          <label class="mini-toggle mini-toggle--full">
            <input id="setting-context-sync-enabled" type="checkbox">
            <span class="mini-toggle__meta">
              <span class="mini-toggle__title">启用本地同步</span>
              <span class="mini-toggle__hint">连接 127.0.0.1 本地服务</span>
            </span>
          </label>
          <label class="mini-field">
            <span class="mini-field__label">端口</span>
            <input id="setting-context-sync-port" type="number" min="1" max="65535" step="1">
          </label>
          <div class="mini-sync">
            <span id="context-sync-online" class="sync-pill is-offline">离线</span>
            <button id="context-sync-push" class="mini-button mini-button--primary" type="button">同步当前会话</button>
          </div>
        </div>
      </section>

      <footer class="mini-footer" id="popup-status"></footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
